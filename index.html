<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Krushil's Portolio</title>

		<link rel="stylesheet" href="assets/css/styles.css" />
	</head>

	<body>
		<header>
			<span>&lt;krushil /&gt;</span>

			<nav>
				<ul>
					<li>
						<a href="#about-me">About me</a>
					</li>
					<li>
						<a href="#my-work">My work</a>
					</li>
					<li>
						<a href="#contact-me">Contact me</a>
					</li>
				</ul>
			</nav>
		</header>

		<main>
			<section id="about-me">
				<div class="wrapper">
					<h2>About me</h2>

					<div class="bio">
						<aside>
							<img src="assets/images/avatar.png" alt="crucial avatar" />
							<div class="name">
								<p>Krushil Naik</p>
								<span class="note">( pronounced <span>'crucial'</span> )</span>
							</div>
						</aside>

						<article>
							Lorem ipsum dolor sit, amet consectetur adipisicing elit. Error modi
							consequatur ex ut! In, at.
						</article>
					</div>
				</div>
			</section>

			<section id="my-work">
				<div class="wrapper">
					<h2>My Work</h2>

					<div class="my-projects">
						<a
							href="#my-work"
							class="project"
							data-label="Project 1"
							data-tech-stack="MERN Stack"
						>
							<img
								src="./assets/images/coming-soon.png"
								alt="project placeholder image"
							/>
						</a>
						<a
							href="#my-work"
							class="project"
							data-label="Project 2"
							data-tech-stack="NextJS"
						>
							<img
								src="./assets/images/coming-soon.png"
								alt="project placeholder image"
							/>
						</a>
						<a
							href="#my-work"
							class="project"
							data-label="Project 3"
							data-tech-stack="React"
						>
							<img
								src="./assets/images/coming-soon.png"
								alt="project placeholder image"
							/>
						</a>
						<a
							href="#my-work"
							class="project"
							data-label="Project 4"
							data-tech-stack="TypeScript"
						>
							<img
								src="./assets/images/coming-soon.png"
								alt="project placeholder image"
							/>
						</a>
						<a
							href="#my-work"
							class="project"
							data-label="Project 5"
							data-tech-stack="NodeJS"
						>
							<img
								src="./assets/images/coming-soon.png"
								alt="project placeholder image"
							/>
						</a>
					</div>
				</div>
			</section>

			<section id="contact-me">
				<div class="wrapper">
					<h2>Contact Me</h2>

					<form>
						<input type="text" name="name" id="name" placeholder="Name:" />
						<input type="email" name="email" id="email" placeholder="Email:" />
						<textarea
							name="message"
							id="message"
							cols="30"
							rows="10"
							placeholder="Message:"
						></textarea>

						<div class="buttons">
							<button class="form-submit" type="submit">Submit</button>

							<ul>
								<li>
									<a
										href="https://github.com/krushilnaik"
										target="blank"
										data-label="GitHub"
									>
										<img
											src="assets/images/github.png"
											alt="github icon"
											width="30"
										/>
									</a>
								</li>
								<li>
									<a
										href="https://www.linkedin.com/in/krushilnaik/"
										target="blank"
										data-label="LinkedIn"
									>
										<img
											src="assets/images/linkedin.png"
											alt="linkedin icon"
											width="30"
										/>
									</a>
								</li>
								<li>
									<a
										href="mailto:krushilnaik96@gmail.com"
										target="blank"
										data-label="Email"
									>
										<img
											src="assets/images/email.png"
											alt="email icon"
											width="30"
										/>
									</a>
								</li>
							</ul>
						</div>
					</form>
				</div>
			</section>
		</main>
	</body>
</html>
