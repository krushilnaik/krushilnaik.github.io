<!DOCTYPE html>

		<link rel="stylesheet" href="assets/css/styles.css" />

	<body>

							id="message"

								<li>

										/>

								</li>
								<li>
									<a href="mailto:krushilnaik96@gmail.com" target="blank">

									</a>

				</div>
